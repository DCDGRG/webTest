version: '3.8'

services:
  app:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - db-data:/app/data
    environment:
      - NODE_ENV=production
      - JWT_SECRET=${JWT_SECRET:-dev-secret-change-in-production}
      - ADMIN_DEFAULT_PASSWORD=${ADMIN_DEFAULT_PASSWORD:-changeme123}
    restart: unless-stopped

volumes:
  db-data:
